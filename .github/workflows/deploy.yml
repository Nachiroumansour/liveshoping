name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            echo "📦 Syncing code..."

            # Créer le dossier si nécessaire
            mkdir -p /srv/projects/livelink

            # Cloner ou mettre à jour le code
            if [ -d "/srv/projects/livelink/.git" ]; then
              cd /srv/projects/livelink
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git /srv/projects/livelink
              cd /srv/projects/livelink
            fi

            echo "🐳 Building and deploying..."
            docker compose up -d --build

            echo "⏳ Waiting for services..."
            sleep 15

            echo "🔍 Checking services..."
            docker ps | grep -E "livelink" || true

            echo "🧹 Cleanup..."
            docker image prune -f

            echo "✅ Deployment complete!"
