name: Deploy to VPS

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DEPLOY_SECRET
          script_stop: true
          script: |
            set -e
            echo "📦 Syncing code..."

            # Créer le dossier si nécessaire
            mkdir -p /srv/projects/livelink

            # Cloner ou mettre à jour le code
            if [ -d "/srv/projects/livelink/.git" ]; then
              cd /srv/projects/livelink
              git fetch origin main
              git reset --hard origin/main
            else
              git clone https://github.com/${{ github.repository }}.git /srv/projects/livelink
              cd /srv/projects/livelink
            fi

            echo "🐳 Building images..."
            docker compose build

            echo "🗄️ Starting database..."
            docker compose up -d db

            echo "⏳ Waiting for database to be healthy..."
            until [ "$(docker inspect -f '{{.State.Health.Status}}' livelink-db 2>/dev/null)" = "healthy" ]; do
              sleep 2
            done

            echo "🔧 Running database migrations..."
            docker compose run --rm backend node src/scripts/migrate-push-type.js

            echo "🚀 Starting services..."
            docker compose up -d

            echo "⏳ Waiting for services..."
            sleep 15

            echo "🔍 Checking services..."
            docker ps | grep -E "livelink" || true

            echo "🧹 Cleanup..."
            docker image prune -f

            echo "📢 Notifying vendors of update..."
            DEPLOY_KEY="${DEPLOY_SECRET:-liveshop-deploy-2024}"
            curl -s -X POST "https://api.livelink.store/api/push/notify-update" \
              -H "Content-Type: application/json" \
              -H "X-Deploy-Secret: ${DEPLOY_KEY}" \
              -d '{"message": "Nouvelle mise à jour disponible ! Ouvrez l'\''app pour en profiter."}' || echo "Push notify skipped (non-blocking)"

            echo "✅ Deployment complete!"
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
