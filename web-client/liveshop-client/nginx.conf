server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Fichiers statiques avec cache long
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Detect social media / link preview bots
    set $is_bot "";
    if ($http_user_agent ~* "(facebookexternalhit|whatsapp|twitterbot|linkedinbot|googlebot|discordbot|telegrambot|slackbot|pinterestbot|applebot|redditbot|embedly)") {
        set $is_bot "1";
    }

    # Bot + shop page: /<linkId>
    location ~ "^/([a-z0-9][a-z0-9_-]{0,98}[a-z0-9])/?$" {
        if ($is_bot = "1") {
            rewrite "^/([^/]+)/?$" https://api.livelink.store/api/og/$1 redirect;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Bot + live page: /<linkId>/live/<liveSlug>
    location ~ "^/([a-z0-9][a-z0-9_-]{0,98}[a-z0-9])/live/([a-z0-9][a-z0-9_-]{0,98}[a-z0-9])/?$" {
        if ($is_bot = "1") {
            rewrite "^/([^/]+)/live/([^/]+)/?$" https://api.livelink.store/api/og/$1/live/$2 redirect;
        }
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback for all other routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
